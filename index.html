    <script>
      // Apply saved theme before first paint to avoid a flash
      ;(function () {
        var theme = localStorage.getItem('theme')
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.dataset.theme = theme
        }
      })()
    </script>
